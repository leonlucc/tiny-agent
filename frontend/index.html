<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>极简智能体</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 侧边栏 - Logo 区 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-star"></i> <span>极简智能体</span></h1>
        </div>
    </div>

    <!-- 主聊天区域 -->
    <div class="main-content">
        <div class="chat-header">
            <div class="chat-title" id="current-chat-title">实时对话</div>
        </div>

        <div class="chat-container" id="chat-container">
            <!-- 初始空状态 -->
            <div class="empty-state" id="empty-state">
                <i class="fas fa-star"></i>
                <h2>欢迎使用极简智能体</h2>
                <p>请开始您的问题或输入需求。</p>
            </div>

            <!-- 消息将通过JS动态生成 -->
        </div>
        
        <template id="typing-indicator-template">
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <span>正在思考...</span>
            </div>
        </template>

        <template id="user-message-template">
            <div class="message user-message">
                <div class="message-content"></div>
            </div>
        </template>

        <template id="assistant-message-template">
            <div class="message assistant-message">
                <details class="thinking-section" hidden open>
                    <summary>思考过程</summary>
                    <div class="thinking-content"></div>
                </details>
                <div class="message-content"></div>
            </div>
        </template>

        <div class="input-container">
            <div class="message-input-wrapper">
                <textarea
                    class="message-input"
                    id="message-input"
                    placeholder="发消息..."
                    rows="1"
                ></textarea>
                <button class="send-button" id="send-button" disabled aria-label="发送消息">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div class="status-bar">
            <span class="status-hint">内容由 AI 生成，仅供参考</span>
            <div class="connection-status" id="connection-status">
                <div class="connection-dot"></div>
                <span data-connection-label>已连接</span>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
